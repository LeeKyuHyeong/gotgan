# 운영 프로파일: --spring.profiles.active=prod 로 활성화 (docker-compose 가 SPRING_PROFILES_ACTIVE=prod 주입).
# 자격증명/URL 은 환경변수로 주입(파일에 비밀번호 넣지 않기).
# docker 배포: 앱→DB 는 컨테이너명 stock-db:3306 (DB_URL 로 주입). 3312 는 호스트 외부접속(DBeaver) 전용.
# 아래 기본값은 docker 없이 호스트에서 직접 구동할 때의 fallback(3312).
spring:
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3312/stock?characterEncoding=utf8mb4&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:stock_app}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false

logging:
  level:
    org.hibernate.SQL: warn
