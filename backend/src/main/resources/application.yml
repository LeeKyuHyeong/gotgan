spring:
  application:
    name: gotgan   # 로그·메트릭 서비스 식별용(패키지/DB명 stock 은 유지 — rename 비용 큼)

  # 기본(local): 포트 3306. 운영은 prod 프로파일(application-prod.yml, 포트 3312).
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/stock?characterEncoding=utf8mb4&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # 스키마 소유는 Flyway. JPA는 검증만.
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # 클라이언트가 보내는 page size 상한 — ?size=100000 같은 과대 요청으로 인한 대량 로드/DoS 방지.
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

server:
  port: 8083    # local·운영 공통 서비스 포트
  error:
    # 예외 상세를 응답 바디로 노출하지 않음(스택트레이스/메시지 누출 방지). 클라이언트는 ErrorResponse 만 본다.
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

# 앱 고유 설정
app:
  kakao:
    # REST API 키: 브라우저(프론트)에도 노출되는 공개값이라 로컬 기본값 유지. 운영은 env로 override.
    rest-api-key: ${KAKAO_REST_API_KEY:865af4cbbc46547691915a3aed45ec79}
    # Client Secret: 민감값 → 환경변수 전용(평문 커밋 금지). 미설정(빈값)이면 카카오 토큰요청에 미포함.
    # 로컬에서 카카오 실로그인 테스트 시 KAKAO_CLIENT_SECRET 를 env로 주입(dev-token 로그인은 불필요).
    client-secret: ${KAKAO_CLIENT_SECRET:}
    # 카카오 로그인 > Redirect URI 에 등록한 값과 정확히 일치해야 함 (프론트 콜백, 방식 A).
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5173/oauth/kakao/callback}
  jwt:
    # 운영에선 반드시 환경변수로 주입. HS256이라 최소 32바이트 이상.
    secret: ${JWT_SECRET:local-dev-secret-please-change-this-to-32+bytes-key}
    access-token-validity-seconds: ${JWT_TTL:86400}   # 1일
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  push:
    # Web Push(VAPID) 키쌍. 아래 기본값은 **로컬 개발 전용** 키 — 운영은 .env.prod 로 별도 키 주입.
    # 공개키는 프론트가 GET /api/push/vapid-public-key 로 받아감.
    vapid-public-key: ${VAPID_PUBLIC_KEY:BD0jk8WxXeghUBaoV7yIXeWe_Vb9ai5JIcUzLT8DBM-u0Z1sF5NCIkhKffFVVi9uGyrCo_yv-Bh4Vm_jUs77nh0}
    vapid-private-key: ${VAPID_PRIVATE_KEY:cKSNZM1-O8RLg24g3CwZBCV7nObnuy0YCuYYqOPfJfw}
    subject: ${PUSH_SUBJECT:mailto:rbgud2380@naver.com}

logging:
  level:
    org.hibernate.SQL: debug
