# 운영 배포: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# 앱은 127.0.0.1:8083 에만 바인딩(호스트 nginx가 프록시). DB 3312는 DBeaver 외부접속 전용(방화벽 stock_db 로 관리 IP만 허용).
services:
  gotgan-db:
    image: mariadb:11
    container_name: gotgan-db
    restart: unless-stopped
    # 공유 호스트(7개 서비스) 보호 — DB 메모리 상한.
    mem_limit: 512m
    environment:
      TZ: Asia/Seoul  # 미설정 시 UTC — 로그·NOW() 가 KST-9h 로 어긋남
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: stock
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      # 외부(DBeaver) 전용. 접근 제어는 Cafe24 방화벽 stock_db 규칙(관리 IP 3개)로.
      - "3312:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  gotgan-app:
    build:
      context: ./backend
    container_name: gotgan-app
    restart: unless-stopped
    # 메모리 상한 — Dockerfile 의 -XX:MaxRAMPercentage=75 가 이 한도(768m) 기준으로 힙(~576m)을 잡게 함.
    # (상한이 없으면 호스트 전체 메모리의 75% 를 노려 타 서비스 OOM 위험.)
    mem_limit: 768m
    depends_on:
      gotgan-db:
        condition: service_healthy
    environment:
      TZ: Asia/Seoul  # JVM 기본존도 이걸 따름 — LocalDate.now() 존 미지정 호출 보호
      SPRING_PROFILES_ACTIVE: prod
      # 앱→DB 는 컨테이너명으로 접속(3306). 3312는 호스트 외부접속용일 뿐.
      DB_URL: jdbc:mariadb://gotgan-db:3306/stock?characterEncoding=utf8mb4&serverTimezone=Asia/Seoul
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL:-86400}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # Web Push(곧만료 알림) — 운영 전용 VAPID 키쌍 (로컬 기본키와 다름)
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      PUSH_SUBJECT: ${PUSH_SUBJECT:-mailto:rbgud2380@naver.com}
    ports:
      # 호스트 루프백에만 노출 → nginx proxy_pass http://127.0.0.1:8083
      - "127.0.0.1:8083:8083"

volumes:
  db-data:
