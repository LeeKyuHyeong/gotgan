# 운영 배포: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# 앱은 127.0.0.1:8083 에만 바인딩(호스트 nginx가 프록시). DB 3312는 DBeaver 외부접속 전용(방화벽 stock_db 로 관리 IP만 허용).
services:
  stock-db:
    image: mariadb:11
    container_name: stock-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: stock
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      # 외부(DBeaver) 전용. 접근 제어는 Cafe24 방화벽 stock_db 규칙(관리 IP 3개)로.
      - "3312:3306"
    volumes:
      - stock-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  stock-app:
    build:
      context: ./backend
    container_name: stock-app
    restart: unless-stopped
    depends_on:
      stock-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 앱→DB 는 컨테이너명으로 접속(3306). 3312는 호스트 외부접속용일 뿐.
      DB_URL: jdbc:mariadb://stock-db:3306/stock?characterEncoding=utf8mb4&serverTimezone=Asia/Seoul
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL:-86400}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      # 호스트 루프백에만 노출 → nginx proxy_pass http://127.0.0.1:8083
      - "127.0.0.1:8083:8083"

volumes:
  stock-db-data:
