# 호스트 nginx 사이트 설정. 배치: /etc/nginx/sites-available/gotgan.kyuhyeong.com.conf
#   ln -s /etc/nginx/sites-available/gotgan.kyuhyeong.com.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d gotgan.kyuhyeong.com   # 443 블록·인증서·80→443 리다이렉트 자동 추가
#
# ⚠ 이 파일은 리포의 원본일 뿐 자동 배포되지 않음 — 변경 시 서버에 수동 반영 후 `nginx -t && systemctl reload nginx`.
#   (인프라 변경이므로 D:\server-infra.md 도 함께 최신화할 것.)
#
# 프론트(SPA)는 빌드 산출물을 정적 서빙, /api 는 docker 앱(127.0.0.1:8083)으로 프록시.
# 프론트 빌드: cd frontend && npm ci && npm run build  → dist 를 root 경로로 배포.

# 로그인 무차별 대입 방어 — IP당 인증 엔드포인트 호출 제한(아래 location /api/auth/ 에서 사용).
# limit_req_zone 은 http 컨텍스트 전용인데, sites-available 파일은 http{} 안에서 include 되므로 여기(server 밖)에 둬도 유효.
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;

server {
    listen 80;
    listen [::]:80;
    server_name gotgan.kyuhyeong.com;

    # Vite 빌드 산출물(frontend/dist) 배포 위치
    root /var/www/gotgan;
    index index.html;

    # 보안 헤더 (certbot 이 이 server 블록을 443 으로 승격하므로 HTTPS 응답에 함께 적용됨).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 텍스트 자산 압축 (JS/CSS 번들·JSON API 응답). 모바일 셀룰러 첫 로드·전송 단축.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types application/javascript application/json application/manifest+json image/svg+xml text/css text/plain;

    # 정적 자산 캐시 (해시 파일명)
    location /assets/ {
        expires 30d;
        # location 의 add_header 는 server 의 것을 상속하지 않으므로(전부 교체) 필요한 헤더를 다시 명시.
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # 인증 엔드포인트만 레이트리밋 — 사람 로그인(1~2회)엔 영향 없고 자동 대입만 차단. burst 로 순간 여유.
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # API → 백엔드 컨테이너(루프백)
    location /api/ {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA 라우팅: 실제 파일 없으면 index.html (카카오 콜백 /oauth/... 등 클라이언트 라우트 처리)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
